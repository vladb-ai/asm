[package]
edition = "2021"
name = "strata-asm-prover-perf"
version = "0.1.0"

[lints]
workspace = true

[[bin]]
name = "strata-asm-prover-perf"
path = "src/main.rs"
test = false
bench = false
doc = false

[dependencies]
moho-recursive-proof = { workspace = true, features = ["test-utils"] }
moho-runtime-impl.workspace = true
moho-types.workspace = true
strata-asm-proof-impl = { workspace = true, features = ["test-utils"] }
strata-asm-sp1-guest-builder = { path = "../../guest-builder/sp1" }
strata-predicate.workspace = true

anyhow.workspace = true
borsh.workspace = true
clap.workspace = true
num-format = "0.4.4"
reqwest = { version = "0.12.28", default-features = false, features = [
  "json",
  "rustls-tls",
] }
serde_json.workspace = true
sp1-sdk.workspace = true
sp1-verifier.workspace = true
ssz.workspace = true
tokio.workspace = true
zkaleido = { workspace = true, features = ["perf"] }
zkaleido-sp1-groth16-verifier.workspace = true
zkaleido-sp1-host.workspace = true
