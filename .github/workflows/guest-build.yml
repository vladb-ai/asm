name: Guest Build

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Keep in sync with `sp1-sdk` / `sp1-verifier` versions in workspace `Cargo.toml`.
  SP1_VERSION: v6.2.0

permissions: {}

jobs:
  sp1-guest-build:
    name: Build SP1 asm and moho guests via docker
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          rustup toolchain install nightly --profile minimal
          rustup default nightly

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          cache-on-failure: true

      - name: Install SP1 toolchain
        run: |
          curl -fsSL --proto '=https' --tlsv1.2 https://sp1.succinct.xyz | bash
          ~/.sp1/bin/sp1up --version "$SP1_VERSION"
          echo "$HOME/.sp1/bin" >> "$GITHUB_PATH"

      - name: Verify SP1 toolchain
        run: cargo prove --version

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0

      - name: Build SP1 asm and moho guests
        run: cargo build --locked -p strata-asm-sp1-guest-builder --release --features docker-build

  guest-build-success:
    name: Check that guest build passed
    runs-on: ubuntu-latest
    if: always()
    needs: [sp1-guest-build]
    timeout-minutes: 5
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
